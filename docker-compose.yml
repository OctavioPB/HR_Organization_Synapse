version: "3.8"

# ─── Shared Airflow config ────────────────────────────────────────────────────
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.0
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-opb}:${POSTGRES_PASSWORD:-changeme}@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-org_synapse_dev_secret}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__LOGGING__LOG_LEVEL: INFO
    # Project code is mounted read-only and added to PYTHONPATH
    PYTHONPATH: /opt/airflow/project
    # Neo4j connection (used by neo4j_import_dag tasks)
    NEO4J_URI: bolt://neo4j:7687
    NEO4J_USER: neo4j
    NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
    # App database connection (separate from Airflow's own DB)
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: ${POSTGRES_DB:-org_synapse}
    POSTGRES_USER: ${POSTGRES_USER:-opb}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    # Graph & ML config
    GRAPH_WINDOW_DAYS: ${GRAPH_WINDOW_DAYS:-30}
    GRAPH_MIN_EVENTS: ${GRAPH_MIN_EVENTS:-100}
    SILO_THRESHOLD: ${SILO_THRESHOLD:-4.0}
    SPOF_ALPHA: ${SPOF_ALPHA:-0.4}
    SPOF_BETA: ${SPOF_BETA:-0.3}
    SPOF_GAMMA: ${SPOF_GAMMA:-0.2}
    SPOF_DELTA: ${SPOF_DELTA:-0.1}
    # Pip-installable project dependencies (pre-baked into custom image in production)
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      networkx>=3.0
      python-louvain>=0.16
      psycopg2-binary>=2.9
      pydantic>=2.0
      kafka-python>=2.0
  volumes:
    - ./etl/dags:/opt/airflow/dags
    - ./:/opt/airflow/project:ro
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ─── Zookeeper (required by Kafka) ─────────────────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.6
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-org_synapse}
      POSTGRES_USER: ${POSTGRES_USER:-opb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opb} -d ${POSTGRES_DB:-org_synapse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Adminer (DB UI) ────────────────────────────────────────────────────────
  adminer:
    image: adminer:4
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # ─── Neo4j ──────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: gds.*
      NEO4J_dbms_security_procedures_allowlist: gds.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Airflow init (runs once) ───────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@example.com 2>/dev/null || true
    restart: on-failure

  # ─── Airflow webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8088:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Airflow scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  zookeeper_data:
  kafka_data:
  postgres_data:
  airflow_logs:
  neo4j_data:
